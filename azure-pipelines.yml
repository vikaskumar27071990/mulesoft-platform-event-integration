# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

# ✅ PEHLE YEH ADD KARO — dekho repo mein kya hai
- script: |
    echo "=== pom.xml content ==="
    cat pom.xml | grep -A 30 "cloudHub2"
  displayName: 'Print pom.xml CloudHub config'

- task: Maven@3
  displayName: 'Build and Deploy to CloudHub 2.0'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package mule:deploy'
    publishJUnitResults: false
    options: >-
      -DskipTests
      -Danypoint.clientId=$(ANYPOINT_CLIENT_ID)
      -Danypoint.clientSecret=$(ANYPOINT_CLIENT_SECRET)
      -Danypoint.orgId=$(ANYPOINT_ORG_ID)