trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  - group: MuleSoft-CD

steps:

- task: Cache@2
  displayName: 'Cache Maven local repo'
  inputs:
    key: 'maven | "$(Agent.OS)" | **/pom.xml'
    restoreKeys: |
      maven | "$(Agent.OS)"
      maven
    path: $(HOME)/.m2/repository

- script: |
    mkdir -p $HOME/.m2
    echo '<settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">' > $HOME/.m2/settings.xml
    echo '  <servers>' >> $HOME/.m2/settings.xml
    echo '    <server>' >> $HOME/.m2/settings.xml
    echo '      <id>anypoint-exchange-v3</id>' >> $HOME/.m2/settings.xml
    echo '      <username>~~~Client~~~</username>' >> $HOME/.m2/settings.xml
    echo "      <password>${ANYPOINT_CLIENT_ID}~?~${ANYPOINT_CLIENT_SECRET}</password>" >> $HOME/.m2/settings.xml
    echo '    </server>' >> $HOME/.m2/settings.xml
    echo '    <server>' >> $HOME/.m2/settings.xml
    echo '      <id>mulesoft-releases</id>' >> $HOME/.m2/settings.xml
    echo '      <username>~~~Client~~~</username>' >> $HOME/.m2/settings.xml
    echo "      <password>${ANYPOINT_CLIENT_ID}~?~${ANYPOINT_CLIENT_SECRET}</password>" >> $HOME/.m2/settings.xml
    echo '    </server>' >> $HOME/.m2/settings.xml
    echo '  </servers>' >> $HOME/.m2/settings.xml
    echo '</settings>' >> $HOME/.m2/settings.xml
    cat $HOME/.m2/settings.xml
  displayName: 'Generate Maven settings.xml'
  env:
    ANYPOINT_CLIENT_ID: $(ANYPOINT_CLIENT_ID)
    ANYPOINT_CLIENT_SECRET: $(ANYPOINT_CLIENT_SECRET)

- script: |
    echo "=== Testing Exchange auth ==="
    HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
      -u "~~~Client~~~:${ANYPOINT_CLIENT_ID}~?~${ANYPOINT_CLIENT_SECRET}" \
      "https://maven.anypoint.mulesoft.com/api/v3/organizations/7db4c620-0a8e-4023-afed-8988c04226fb/maven/com/mulesoft/connectors/mule-salesforce-connector/10.22.5/mule-salesforce-connector-10.22.5.pom")
    echo "HTTP STATUS: $HTTP_STATUS"
  displayName: 'Debug - Test Exchange auth'
  env:
    ANYPOINT_CLIENT_ID: $(ANYPOINT_CLIENT_ID)
    ANYPOINT_CLIENT_SECRET: $(ANYPOINT_CLIENT_SECRET)

- task: Maven@4
  displayName: 'Step 1 - Publish to Exchange'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean deploy'
    publishJUnitResults: false
    options: >-
      -DskipTests
      -Danypoint.clientId=$(ANYPOINT_CLIENT_ID)
      -Danypoint.clientSecret=$(ANYPOINT_CLIENT_SECRET)
      -Danypoint.orgId=$(ANYPOINT_ORG_ID)

- task: Maven@4
  displayName: 'Step 2 - Deploy to CloudHub 2.0'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'deploy -DmuleDeploy'
    publishJUnitResults: false
    options: >-
      -DskipTests
      -Danypoint.clientId=$(ANYPOINT_CLIENT_ID)
      -Danypoint.clientSecret=$(ANYPOINT_CLIENT_SECRET)
      -Danypoint.orgId=$(ANYPOINT_ORG_ID)
      -Dsf.consumerKey=$(SF_CONSUMER_KEY)
      -Dsf.consumerSecret=$(SF_CONSUMER_SECRET)
      -Dsf.username=$(SF_USERNAME)
      -Dsf.password=$(SF_PASSWORD)
      -Dsf.target.username=$(SF_TARGET_USERNAME)
      -Dsf.target.password=$(SF_TARGET_PASSWORD)