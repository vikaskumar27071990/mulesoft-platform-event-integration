#
trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  - group: MuleSoft-CD

steps:

- script: |
    mvn help:effective-pom -Doutput=effective-pom.xml
    cat effective-pom.xml
  displayName: 'Print Effective POM'

- task: Maven@4
  displayName: 'Build and Deploy to CloudHub 2.0'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean deploy -DmuleDeploy'
    publishJUnitResults: false
    options: >-
      -X
      -DskipTests
      -Danypoint.clientId=$(ANYPOINT_CLIENT_ID)
      -Danypoint.clientSecret=$(ANYPOINT_CLIENT_SECRET)
      -Danypoint.orgId=$(ANYPOINT_ORG_ID)
      -Dsf.consumerKey=$(SF_CONSUMER_KEY)
      -Dsf.consumerSecret=$(SF_CONSUMER_SECRET)
      -Dsf.username=$(SF_USERNAME)
      -Dsf.password=$(SF_PASSWORD)
      -Dsf.target.username=$(SF_TARGET_USERNAME)
      -Dsf.target.password=$(SF_TARGET_PASSWORD)